<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>keelo chess</title>

  <script>
    const APP_STORE_URL = "https://apps.apple.com/il/app/keelo-chess/id6763722537?l=he";
    const GOOGLE_PLAY_URL = "https://play.google.com/store/apps/details?id=com.elokehila.app";

    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    const isIOS =
      /iPad|iPhone|iPod/.test(userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    const isAndroid = /android/i.test(userAgent);

    window.onload = function () {
      if (isIOS) {
        window.location.href = APP_STORE_URL;
      } else if (isAndroid) {
        window.location.href = GOOGLE_PLAY_URL;
      }
    };
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f6f1e8;
      color: #12351f;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fffaf1;
      border: 1px solid rgba(18, 53, 31, 0.12);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 16px 40px rgba(18, 53, 31, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 24px;
      font-size: 18px;
      line-height: 1.5;
    }

    a {
      display: block;
      text-decoration: none;
      background: #1b6b35;
      color: white;
      padding: 16px 18px;
      border-radius: 18px;
      font-weight: 700;
      margin-top: 12px;
      font-size: 16px;
    }

    .secondary {
      background: #12351f;
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      opacity: 0.65;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>keelo chess</h1>
    <p>האפליקציה הקהילתית לשחמט שכונתי</p>

    <a href="https://apps.apple.com/il/app/keelo-chess/id6763722537?l=he">הורדה לאייפון</a>
    <a class="secondary" href="https://play.google.com/store/apps/details?id=com.elokehila.app">הורדה לאנדרואיד</a>

    <div class="small">
      אם לא הועברת אוטומטית, בחר את החנות המתאימה.
    </div>
  </main>
</body>
</html>
